name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.2.0)"
        required: true

permissions:
  contents: write

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  gate:
    uses: ./.github/workflows/firebase-ci.yml
    secrets: inherit

  deploy:
    name: Deploy to Prod
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies and build
        working-directory: functions
        run: npm ci

      - name: Build functions
        working-directory: functions
        run: npm run build

      - name: Write prod index.html
        run: |
          cat > public/index.html << 'PRODHTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>Mom Bucks</title>
            </head>
            <body><h1>Mom Bucks</h1><p>Production — mom-bucks-prod-81096</p></body>
          </html>
          PRODHTML

      - name: Write service account key
        run: echo '${{ secrets.FIREBASE_SA_KEY_PROD }}' > /tmp/sa-key.json

      - name: Install firebase-tools
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa-key.json
        run: >
          firebase deploy
          --project mom-bucks-prod-81096
          --only functions,firestore:rules,firestore:indexes,storage,hosting
          --non-interactive
          --force

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Run smoke test
        working-directory: tools
        env:
          FIREBASE_WEB_API_KEY_PROD: ${{ secrets.FIREBASE_WEB_API_KEY_PROD }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa-key.json
        run: |
          uv sync
          uv run mb --project prod smoke-test

      - name: Create release tag
        run: |
          git tag "${{ inputs.version }}"
          git push origin "${{ inputs.version }}"

      - name: Clean up service account key
        if: always()
        run: rm -f /tmp/sa-key.json
